[build]
  command = "npm run build"
  publish = "dist"
  functions = ".netlify/functions"

[dev]
  command = "npm run dev"
  functions = ".netlify/functions"

[build.environment]
  NODE_VERSION = "24"

[[redirects]]
  from = "/_astro/*"
  to = "/_astro/:splat"
  status = 200
  force = false

[[redirects]]
  from = "/img/*"
  to = "/img/:splat"
  status = 200
  force = false

[[redirects]]
  from = "/*"
  to = "/.netlify/functions/ssr"
  status = 200
  force = true
